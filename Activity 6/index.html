<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>LANGOY INDUSTRIES CO.</title>
    </head>
    <script>

        function toggleMode(){

            document.body.classList.toggle("dark-mode");

            if(document.body.classList.contains("dark-mode")){
                localStorage.setItem("theme","dark");
            }else{
                localStorage.setItem("theme","light");
            }

        }

        if(localStorage.getItem("theme") === "dark"){
            document.body.classList.add("dark-mode");
        }

    </script>
    <body>
        <div class="header">
            <h1>LANGOY INDUSTRIES</h1>
            <p>The Oriental Pearl of the aquatic industry!</p>
            <button onclick="toggleMode()" class="mode-btn">🌙 Dark Mode</button>
        </div>

        <div id="nav">
            <a href="home.html" target="mainframe">Home</a>
            <a href="products.html" target="mainframe">Products</a>
            <a href="about.html" target="mainframe">About</a>
        </div>

        <div class="main">
            <iframe src="home.html" name="mainframe" width="100%" height="100%" style="border: none;"></iframe>
        </div>

        <div class="footer">
            <p>All right reserved &copy; 2026. BAI Systems Solutions.</p>
        </div>

    </body>
</html>
